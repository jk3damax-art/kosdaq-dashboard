name: 웹앱 배포 (GitHub Pages)

# main에 새 내용이 올라올 때마다(=매일 자동 갱신 포함) 웹앱을 다시 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 번 배포되지 않도록
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: public 폴더를 배포 대상으로 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
