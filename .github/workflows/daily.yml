name: 매일 아침 시장 점검 갱신 + 배포

on:
  schedule:
    # GitHub Actions는 UTC 기준. 오전 7시 KST = 22:00 UTC (전날)
    # ⚠️ 정각(0분)은 전 세계 cron이 몰려 GitHub이 작업을 지연/누락시킴.
    #    그래서 정각을 피하고, 혹시 한 번 누락돼도 다음 트리거가 받도록 여러 번 시도한다.
    - cron: "7 22 * * *"   # 07:07 KST (메인)
    - cron: "27 22 * * *"  # 07:27 KST (백업1)
    - cron: "7 23 * * *"   # 08:07 KST (백업2)
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write
  pages: write
  id-token: write

# 동시에 여러 번 돌지 않도록
concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  # 1단계: 지표·뉴스·AI 코멘트 새로 만들어 커밋
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 지표 조회 + AI 해석 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/fetch.mjs
      - name: daily.json 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/daily.json
          git diff --staged --quiet || git commit -m "chore: 일일 지표 갱신 $(date -u +%Y-%m-%d)"
          git push

  # 2단계: 위에서 갱신이 끝나면 이어서 앱(웹) 배포 → 친구가 보는 화면에 바로 반영
  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # refresh가 방금 커밋한 최신 데이터를 받기
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: public 폴더 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
