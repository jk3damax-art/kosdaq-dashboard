name: 매일 아침 시장 점검 갱신 + 배포

on:
  schedule:
    # GitHub Actions는 UTC 기준. 오전 7시 KST = 22:00 UTC (전날)
    # ⚠️ GitHub 무료 예약(cron)은 부하가 몰리면 트리거를 지연·누락시킨다(특히 개인 저장소).
    #    그래서 아침 시간대(06:37~09:07 KST)에 촘촘히 여러 번 트리거를 깔아 두고,
    #    아래 refresh 잡의 "이미 오늘 갱신됨" 게이트로 중복 실행은 알아서 스킵한다.
    #    → 한 번이라도 살아남으면 갱신되고, 여러 번 살아남아도 헛돌지 않는다.
    - cron: "37 21 * * *"  # 06:37 KST
    - cron: "52 21 * * *"  # 06:52 KST
    - cron: "7 22 * * *"   # 07:07 KST (메인)
    - cron: "22 22 * * *"  # 07:22 KST
    - cron: "37 22 * * *"  # 07:37 KST
    - cron: "52 22 * * *"  # 07:52 KST
    - cron: "7 23 * * *"   # 08:07 KST (백업)
    - cron: "37 23 * * *"  # 08:37 KST
    - cron: "7 0 * * *"    # 09:07 KST (최종 백업)
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write
  pages: write
  id-token: write

# 동시에 여러 번 돌지 않도록
concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  # 1단계: 지표·뉴스·AI 코멘트 새로 만들어 커밋
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # 촘촘한 cron 중 하나가 이미 오늘 갱신을 끝냈으면 나머지는 스킵(헛돌기 방지).
      # 수동 실행(workflow_dispatch)은 이 게이트를 무시하고 항상 갱신한다.
      - name: 오늘 이미 갱신됐는지 확인
        id: gate
        run: |
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          UPDATED=$(grep -o '"updatedAt": *"[^"]*"' public/daily.json | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' | head -1)
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$UPDATED" = "$TODAY_KST" ]; then
            echo "이미 오늘($TODAY_KST) 갱신됨 → 스킵"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "갱신 진행 (오늘=$TODAY_KST, 파일=$UPDATED)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: 지표 조회 + AI 해석 생성
        if: steps.gate.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/fetch.mjs
      - name: daily.json 커밋
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/daily.json
          git diff --staged --quiet || git commit -m "chore: 일일 지표 갱신 $(date -u +%Y-%m-%d)"
          git push

  # 2단계: 위에서 갱신이 끝나면 이어서 앱(웹) 배포 → 친구가 보는 화면에 바로 반영
  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # refresh가 방금 커밋한 최신 데이터를 받기
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: public 폴더 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
