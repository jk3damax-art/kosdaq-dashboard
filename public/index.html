<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>아침 시장 점검</title>
<!-- PWA: 앱처럼 설치/실행되게 하는 설정 -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0d1117" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="시장점검" />
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --line: #21262d;
    --text: #e6edf3;
    --muted: #8b949e;
    --up: #f85149;     /* 한국식: 상승=빨강 */
    --down: #3fb950;   /* 하락=초록 */
    --accent: #58a6ff;
    --warn: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    line-height: 1.55; max-width: 760px; margin: 0 auto;
    padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }
  header { margin: 8px 0 20px; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .updated { color: var(--muted); font-size: 12px; margin-top: 4px; }

  /* 로그인 */
  #gate {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 10; padding: 20px;
  }
  #gate input {
    background: var(--card); border: 1px solid var(--line); color: var(--text);
    padding: 12px 16px; border-radius: 10px; font-size: 16px; width: 100%; max-width: 280px;
  }
  #gate button {
    background: var(--accent); color: #0d1117; border: none; font-weight: 700;
    padding: 12px 24px; border-radius: 10px; font-size: 15px; cursor: pointer;
  }
  #gate .hint { color: var(--muted); font-size: 12px; }
  #gateErr { color: var(--up); font-size: 13px; min-height: 16px; }

  /* AI 해석 박스 */
  .ai {
    background: linear-gradient(135deg, #161b22, #1c2333);
    border: 1px solid var(--line); border-radius: 16px; padding: 20px; margin-bottom: 18px;
  }
  .ai .tag { color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .ai .reading { font-size: 16px; margin: 10px 0 14px; }
  .ai .mindset {
    font-size: 14px; color: var(--muted); border-left: 3px solid var(--accent);
    padding-left: 12px; font-style: italic;
  }

  /* 지표 카드 그리드 */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
  .card .label { font-size: 13px; color: var(--muted); }
  .card .price { font-size: 26px; font-weight: 700; margin-top: 6px; letter-spacing: -0.5px; }
  .card .chg { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .card .note { font-size: 11px; color: var(--muted); margin-top: 6px; min-height: 14px; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--muted); }
  svg.spark { width: 100%; height: 36px; margin-top: 10px; display: block; }

  /* 외국인/기관/개인 수급 */
  .flow { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--line); }
  .flow-title { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.2px; }
  .flow-row { display: flex; justify-content: space-between; font-size: 12px; padding: 1px 0; }
  .flow-row span:first-child { color: var(--muted); }
  .flow-row span:last-child { font-weight: 700; font-variant-numeric: tabular-nums; }
  .flow-na { font-size: 11px; color: var(--muted); }

  .badge {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px;
    border-radius: 999px; margin-top: 8px;
  }
  .badge.calm { background: rgba(63,185,80,.15); color: var(--down); }
  .badge.watch { background: rgba(210,153,34,.15); color: var(--warn); }
  .badge.fear { background: rgba(248,81,73,.15); color: var(--up); }
  /* VIX 색깔 눈금 막대 */
  .gauge {
    position: relative; height: 7px; border-radius: 4px; margin-top: 12px;
    background: linear-gradient(90deg, #3fb950 0%, #d29922 55%, #f85149 100%);
  }
  .gauge-marker {
    position: absolute; top: -3px; width: 3px; height: 13px; background: #fff;
    border-radius: 2px; transform: translateX(-50%); box-shadow: 0 0 5px rgba(0,0,0,.7);
  }
  .gauge-labels {
    display: flex; justify-content: space-between; font-size: 9px;
    color: var(--muted); margin-top: 4px;
  }

  footer { color: var(--muted); font-size: 11px; text-align: center; margin: 24px 0 8px; }
  .err { color: var(--warn); font-size: 12px; }

  /* 보유 종목 섹션 */
  .section-title { font-size: 15px; font-weight: 700; margin: 26px 0 12px; letter-spacing: -0.3px; }
  .stock {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px; margin-bottom: 12px;
  }
  .stock-head { display: flex; justify-content: space-between; align-items: baseline; }
  .stock-name { font-size: 15px; font-weight: 700; }
  .stock-code { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 400; }
  .stock-price { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .stock-chg { font-size: 13px; font-weight: 600; }
  /* 52주 위치 막대 */
  .range { position: relative; height: 6px; border-radius: 4px; margin: 12px 0 4px;
    background: linear-gradient(90deg, #3fb950, #d29922, #f85149); }
  .range-marker { position: absolute; top: -3px; width: 3px; height: 12px; background: #fff;
    border-radius: 2px; transform: translateX(-50%); box-shadow: 0 0 5px rgba(0,0,0,.7); }
  .range-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); }
  .stock-note { font-size: 13px; margin: 12px 0 4px; line-height: 1.5; }
  .tags { margin: 6px 0; }
  .tag-chip { display: inline-block; font-size: 10px; background: rgba(88,166,255,.12);
    color: var(--accent); padding: 2px 8px; border-radius: 999px; margin-right: 5px; }
  .news { list-style: none; margin-top: 10px; border-top: 1px solid var(--line); padding-top: 10px; }
  .news li { font-size: 12px; color: var(--muted); padding: 3px 0; line-height: 1.4; }
  .news li::before { content: "📰 "; }

  /* 둘만의 메모장 */
  .memo-write { display: flex; gap: 8px; margin-bottom: 12px; }
  .memo-write input {
    flex: 1; background: var(--card); border: 1px solid var(--line); color: var(--text);
    padding: 11px 14px; border-radius: 10px; font-size: 14px; min-width: 0;
  }
  .memo-write button {
    background: var(--accent); color: #0d1117; border: none; font-weight: 700;
    padding: 0 16px; border-radius: 10px; font-size: 14px; cursor: pointer; white-space: nowrap;
  }
  .name-row { font-size: 12px; color: var(--muted); margin-bottom: 10px; display: flex;
    align-items: center; gap: 6px; }
  .who-btn {
    background: var(--card); border: 1px solid var(--line); color: var(--muted);
    padding: 5px 14px; border-radius: 999px; font-size: 13px; cursor: pointer;
  }
  .who-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent);
    font-weight: 700; }
  .who-change { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .who-change b { color: var(--accent); }
  .who-change .change-link { cursor: pointer; text-decoration: underline; margin-left: 4px; }
  /* '나는 누구?' 선택 모달 */
  .who-modal { position: fixed; inset: 0; background: rgba(0,0,0,.75);
    display: flex; align-items: center; justify-content: center; z-index: 20; padding: 24px; }
  .who-box { background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 28px 24px; text-align: center; max-width: 320px; width: 100%; }
  .who-title { font-size: 18px; font-weight: 700; }
  .who-sub { font-size: 13px; color: var(--muted); margin: 6px 0 20px; }
  .who-pick { display: block; width: 100%; background: var(--accent); color: #0d1117;
    border: none; font-size: 17px; font-weight: 700; padding: 15px; border-radius: 12px;
    margin-top: 10px; cursor: pointer; }
  .who-pick[data-who="서동범"] { background: #2ea043; }
  .memo { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px; position: relative; }
  .memo .meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .memo .who { color: var(--accent); font-weight: 700; }
  .memo .body { font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .memo .del { position: absolute; top: 8px; right: 10px; color: var(--muted);
    background: none; border: none; cursor: pointer; font-size: 14px; }
  .memo-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 16px 0; }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>☕ 아침 시장 점검</h1>
    <div class="updated" id="updated">불러오는 중…</div>
  </header>

  <div class="ai" id="aiBox">
    <div class="tag">오늘의 계기판 읽기</div>
    <div class="reading" id="aiReading">…</div>
    <div class="mindset" id="aiMindset">…</div>
  </div>

  <div class="grid" id="grid"></div>

  <h2 class="section-title">📌 내 종목 관찰 일지</h2>
  <div id="holdings"></div>

  <h2 class="section-title">💬 둘만의 메모</h2>
  <div class="who-change" id="whoRow"></div>
  <div class="memo-write">
    <input id="memoText" placeholder="종목·시장 메모 남기기 (예: HLB FDA D-30)" maxlength="500" />
    <button id="memoSend">남기기</button>
  </div>
  <div id="memoList"></div>

  <!-- 처음 한 번만 뜨는 '나는 누구?' 선택 창 -->
  <div id="whoModal" class="who-modal" style="display:none">
    <div class="who-box">
      <div class="who-title">나는 누구인가요?</div>
      <div class="who-sub">한 번만 고르면 계속 기억해요</div>
      <button class="who-pick" data-who="김진욱">김진욱</button>
      <button class="who-pick" data-who="서동범">서동범</button>
    </div>
  </div>

  <footer>
    지표는 미래를 맞히는 점쟁이가 아니라 운전 계기판입니다.<br />
    종목 코멘트는 그날의 사실 정리일 뿐, 예측·매매 권유가 아닙니다.<br />
    투자 판단과 책임은 본인에게 있습니다.
  </footer>
</div>

<script>
// 암호 없이 바로 데이터 로드 (링크 아는 사람만 보는 방식)
loadData();

// 앱(PWA) 등록 - 홈 화면 추가 + 전체화면 실행 + 오프라인 마지막 화면
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      reg.update(); // 열 때마다 새 버전 확인
      // 새 서비스워커가 준비되면 즉시 적용
      reg.addEventListener("updatefound", () => {
        const sw = reg.installing;
        if (sw) sw.addEventListener("statechange", () => {
          if (sw.state === "activated") location.reload();
        });
      });
    }).catch(() => {});
  });
}

// ── 둘만의 메모장 (구글 시트 연동) ───────────────────────────────
// 구글 Apps Script 웹앱 배포 URL을 여기에 넣으면 활성화됩니다.
const MEMO_API = "https://script.google.com/macros/s/AKfycbwS0hrH9UZX7Qb6smktTLJifU9vUtS0vQsajvIEZ3GScN72FZQAKz9yDI7g6szX-HVG/exec";

const whoRow = document.getElementById("whoRow");
const whoModal = document.getElementById("whoModal");
const memoText = document.getElementById("memoText");
const memoSend = document.getElementById("memoSend");
const memoList = document.getElementById("memoList");

// 이 기기의 사용자가 누구인지 (김진욱 / 서동범). 한 번 고르면 계속 기억됨.
function getWho() { return localStorage.getItem("memoName") || ""; }

// 이름 표시줄: 고른 이름 + 작게 '바꾸기'
function renderWhoRow() {
  const who = getWho();
  whoRow.innerHTML = who
    ? `나: <b>${who}</b><span class="change-link" id="changeWho">바꾸기</span>`
    : "";
}

// 선택 모달 열기/닫기
function openWhoModal() { whoModal.style.display = "flex"; }
function closeWhoModal() { whoModal.style.display = "none"; }

// 모달 버튼 클릭 → 이름 저장, 모달 닫기
whoModal.addEventListener("click", (e) => {
  const pick = e.target.closest(".who-pick");
  if (!pick) return;
  localStorage.setItem("memoName", pick.dataset.who);
  renderWhoRow();
  closeWhoModal();
});

// '바꾸기' 클릭 → 다시 선택 모달
whoRow.addEventListener("click", (e) => {
  if (e.target.id === "changeWho") openWhoModal();
});

// 앱 처음 열렸는데 아직 이름을 안 골랐으면 선택 모달을 띄움
renderWhoRow();
if (!getWho()) openWhoModal();

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
  );
}
function timeAgo(iso) {
  try {
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return "방금";
    if (diff < 3600) return Math.floor(diff / 60) + "분 전";
    if (diff < 86400) return Math.floor(diff / 3600) + "시간 전";
    return new Date(iso).toLocaleDateString("ko-KR", { month: "numeric", day: "numeric" });
  } catch { return ""; }
}

async function loadMemos() {
  if (!MEMO_API) {
    memoList.innerHTML =
      '<div class="memo-empty">메모 기능은 구글 시트 연결 후 켜져요.</div>';
    return;
  }
  try {
    const res = await fetch(MEMO_API);
    const data = await res.json();
    renderMemos(data.memos || []);
  } catch {
    memoList.innerHTML = '<div class="memo-empty">메모를 불러오지 못했어요.</div>';
  }
}

function renderMemos(memos) {
  if (!memos.length) {
    memoList.innerHTML = '<div class="memo-empty">아직 메모가 없어요. 첫 메모를 남겨보세요.</div>';
    return;
  }
  // 최신이 위로
  memoList.innerHTML = memos
    .slice()
    .reverse()
    .map(
      (m) => `
      <div class="memo">
        <button class="del" data-ts="${m.ts}" title="삭제">✕</button>
        <div class="meta"><span class="who">${escapeHtml(m.name || "익명")}</span> · ${timeAgo(m.ts)}</div>
        <div class="body">${escapeHtml(m.text || "")}</div>
      </div>`
    )
    .join("");
}

async function sendMemo() {
  const text = memoText.value.trim();
  if (!text) return;
  if (!MEMO_API) { alert("메모 기능은 구글 시트 연결 후 켜져요."); return; }
  const name = getWho();
  if (!name) { openWhoModal(); return; } // 이름 안 골랐으면 선택 모달부터
  memoSend.disabled = true;
  try {
    await fetch(MEMO_API, {
      method: "POST",
      // Apps Script는 단순요청이어야 CORS가 통과되므로 text/plain로 보냄
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "add", name, text }),
    });
    memoText.value = "";
    await loadMemos();
  } catch {
    alert("메모 전송에 실패했어요. 잠시 후 다시 시도해줘.");
  } finally {
    memoSend.disabled = false;
  }
}

memoSend.addEventListener("click", sendMemo);
memoText.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMemo(); });
memoList.addEventListener("click", async (e) => {
  const btn = e.target.closest(".del");
  if (!btn || !MEMO_API) return;
  if (!confirm("이 메모를 지울까요?")) return;
  await fetch(MEMO_API, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "delete", ts: btn.dataset.ts }),
  });
  await loadMemos();
});

loadMemos();
setInterval(loadMemos, 30000); // 30초마다 새 메모 확인

// ── 데이터 로드 & 렌더 ───────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch("./daily.json?t=" + Date.now());
    if (!res.ok) throw new Error("daily.json 없음");
    const d = await res.json();
    render(d);
  } catch (e) {
    document.getElementById("updated").innerHTML =
      '<span class="err">데이터를 아직 못 불러왔어요. 매일 오전 7시 갱신 예정.</span>';
  }
}

function fmt(n, unit) {
  if (n == null) return "확인필요";
  const s = n.toLocaleString("ko-KR", { maximumFractionDigits: unit === "%" ? 2 : 2 });
  return unit === "%" ? s + "%" : unit === "원" ? s + "원" : s;
}

function chgClass(p) { return p > 0 ? "up" : p < 0 ? "down" : "flat"; }
function chgText(p) {
  if (p == null) return "";
  const sign = p > 0 ? "▲" : p < 0 ? "▼" : "─";
  return `${sign} ${Math.abs(p).toFixed(2)}%`;
}

// 미니 스파크라인 SVG
function spark(hist, cls) {
  if (!hist || hist.length < 2) return "";
  const w = 200, h = 36, min = Math.min(...hist), max = Math.max(...hist);
  const range = max - min || 1;
  const pts = hist.map((v, i) => {
    const x = (i / (hist.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const color = cls === "up" ? "#f85149" : cls === "down" ? "#3fb950" : "#8b949e";
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// VIX 상태 뱃지
function vixBadge(v) {
  if (v == null) return "";
  if (v < 20) return '<span class="badge calm">😌 평온</span>';
  if (v < 30) return '<span class="badge watch">😟 경계</span>';
  return '<span class="badge fear">😱 시장이 겁먹음</span>';
}
// VIX 색깔 눈금 막대 (0~40 범위로 위치 표시)
function vixGauge(v) {
  if (v == null) return "";
  const pct = Math.max(0, Math.min(100, (v / 40) * 100));
  return `
    <div class="gauge"><div class="gauge-marker" style="left:${pct}%"></div></div>
    <div class="gauge-labels"><span>0 평온</span><span>20</span><span>30</span><span>40 공포</span></div>`;
}
// VIX 한 줄 설명
function vixNote(v) {
  if (v == null) return "";
  if (v < 20) return "지금은 낮은 편 = 시장이 평온해요";
  if (v < 30) return "약간 높은 편 = 시장이 긴장하기 시작";
  return "높은 편 = 공포가 크다는 건 이미 많이 반영됐을 수도";
}
// 환율 영향 설명 (코스닥 투자자 관점)
function fxNote(price, chgPct) {
  if (price == null) return "";
  let level;
  if (price >= 1450) level = "원화가 약한(고환율) 편 = 외국인이 한국 주식 팔기 쉬운 환경 → 코스닥엔 부담될 수 있어요.";
  else if (price <= 1250) level = "원화가 강한(저환율) 편 = 외국인 자금 유입에 우호적 → 코스닥엔 좋은 편.";
  else level = "환율은 무난한 수준이에요.";
  const dir = chgPct > 0 ? " (오늘은 환율↑ 원화 약세)" :
              chgPct < 0 ? " (오늘은 환율↓ 원화 강세)" : "";
  return level + dir;
}

// 유가 한 줄 설명
function oilNote(chgPct) {
  if (chgPct == null) return "";
  if (chgPct >= 2) return "오늘 급등 · 물가·정유/항공주에 영향 줄 수 있어요";
  if (chgPct <= -2) return "오늘 급락 · 물가 부담은 다소 완화되는 편";
  return "유가는 무난한 흐름이에요";
}

// 외국인/기관/개인 수급 표시 (백만원 단위 → 억원으로 환산해서 보여줌)
function flowBlock(f) {
  if (!f || !f.ok) {
    return '<div class="flow"><div class="flow-na">수급 데이터 확인 필요</div></div>';
  }
  // 백만원 → 억원 (가독성). +면 빨강(순매수), -면 초록(순매도) = 한국식
  const eok = (v) => (v == null ? null : Math.round(v / 100));
  const row = (name, v) => {
    const e = eok(v);
    if (e == null) return `<div class="flow-row"><span>${name}</span><span class="flat">—</span></div>`;
    const cls = e > 0 ? "up" : e < 0 ? "down" : "flat";
    const sign = e > 0 ? "+" : "";
    return `<div class="flow-row"><span>${name}</span><span class="${cls}">${sign}${e.toLocaleString("ko-KR")}억</span></div>`;
  };
  return `<div class="flow">
    <div class="flow-title">오늘 수급 (순매수, 억원)</div>
    ${row("외국인", f.foreign)}
    ${row("기관", f.institution)}
    ${row("개인", f.individual)}
  </div>`;
}

// 금리 속도 노트
function rateNote(vel) {
  if (vel == null) return "";
  if (vel >= 0.2) return `최근 5일 +${vel}%p · 빠르게 오르는 중 (성장주 부담)`;
  if (vel <= -0.2) return `최근 5일 ${vel}%p · 내려오는 중`;
  return `최근 5일 ${vel >= 0 ? "+" : ""}${vel}%p · 완만`;
}

function render(d) {
  document.getElementById("updated").textContent = "업데이트: " + (d.updatedAt || "—");

  // AI 해석
  document.getElementById("aiReading").textContent = d.ai?.reading || "—";
  document.getElementById("aiMindset").textContent = d.ai?.mindset || "";

  // 지표 카드들
  const m = d.metrics || {};
  const flow = d.flow || {};
  const order = ["kospi", "kosdaq", "dow", "nasdaq", "ust10y", "vix", "usdkrw", "oil"];
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (const key of order) {
    const x = m[key];
    if (!x) continue;
    const cls = chgClass(x.changePct);
    let note = "";
    let badge = "";
    let gauge = "";
    if (key === "ust10y") note = rateNote(d.rateVelocity);
    if (key === "vix") { badge = vixBadge(x.price); gauge = vixGauge(x.price); note = vixNote(x.price); }
    if (key === "usdkrw") note = fxNote(x.price, x.changePct);
    if (key === "oil") note = oilNote(x.changePct);
    // VIX는 흐름 차트(최근 추이) + 눈금 막대(지금 위치)를 함께 표시
    const visual = key === "vix" ? spark(x.history, cls) + gauge : spark(x.history, cls);
    // 코스피·코스닥 카드에는 외국인/기관/개인 수급을 붙인다
    const flowHtml = (key === "kospi" || key === "kosdaq") ? flowBlock(flow[key]) : "";

    grid.insertAdjacentHTML("beforeend", `
      <div class="card">
        <div class="label">${x.label}</div>
        <div class="price">${fmt(x.price, x.unit)}</div>
        <div class="chg ${cls}">${chgText(x.changePct)}</div>
        ${badge}
        ${visual}
        ${flowHtml}
        <div class="note">${note}</div>
      </div>
    `);
  }

  // 보유 종목 관찰 일지
  renderHoldings(d.holdings || []);
}

// 52주 위치 한 줄 설명
function rangeWord(p) {
  if (p == null) return "";
  if (p >= 80) return "연중 고점 부근 (비싼 구간)";
  if (p >= 55) return "연중 중상단";
  if (p >= 30) return "연중 중간쯤";
  return "연중 저점 부근 (싼 구간)";
}

function renderHoldings(holdings) {
  const box = document.getElementById("holdings");
  box.innerHTML = "";
  if (!holdings.length) {
    box.innerHTML = '<div class="stock"><div class="stock-note">종목 데이터를 불러오는 중…</div></div>';
    return;
  }
  for (const h of holdings) {
    const cls = chgClass(h.changePct);
    const rp = h.rangePct;
    const rangeBar = rp == null ? "" : `
      <div class="range"><div class="range-marker" style="left:${rp}%"></div></div>
      <div class="range-labels"><span>연저점</span><span>${rangeWord(rp)}</span><span>연고점</span></div>`;
    const tags = (h.ai?.tags || []).map((t) => `<span class="tag-chip">#${t}</span>`).join("");
    const news = (h.news || []).slice(0, 3).map((n) => `<li>${n.title}</li>`).join("");

    box.insertAdjacentHTML("beforeend", `
      <div class="stock">
        <div class="stock-head">
          <div><span class="stock-name">${h.label}</span><span class="stock-code">${h.code}</span></div>
          <div style="text-align:right">
            <div class="stock-price">${fmt(h.price, h.unit)}</div>
            <div class="stock-chg ${cls}">${chgText(h.changePct)}</div>
          </div>
        </div>
        ${spark(h.history, cls)}
        ${rangeBar}
        <div class="stock-note">${h.ai?.note || ""}</div>
        <div class="tags">${tags}</div>
        ${news ? `<ul class="news">${news}</ul>` : ""}
      </div>
    `);
  }
}
</script>
</body>
</html>
